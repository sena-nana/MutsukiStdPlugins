name: Platform compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component rustfmt
      - run: cargo metadata --locked --format-version 1
      - run: cargo fmt --check
      - run: cargo check --locked
      - run: cargo test --locked

