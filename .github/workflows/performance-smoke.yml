name: Performance model smoke

on:
  push:
  pull_request:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable
      - name: Run deterministic plugin smoke
        run: >-
          python scripts/run-performance-model.py
          --mode smoke
          --process-runs 2
          --output artifacts/performance/issue5-smoke.json
      - name: Upload report and raw samples
        uses: actions/upload-artifact@v6
        with:
          name: std-plugins-performance-${{ matrix.os }}
          path: artifacts/performance/
          if-no-files-found: error

  fixed-reference:
    name: Fixed reference (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            labels: [self-hosted, mutsuki-reference, macOS, ARM64]
          - name: windows-x64
            labels: [self-hosted, mutsuki-reference, Windows, X64]
    runs-on: ${{ matrix.labels }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable
      - name: Run owner reference
        run: >-
          python scripts/run-performance-model.py
          --mode reference
          --process-runs 3
          --repository MutsukiStdPlugins=.
          --output artifacts/performance/reference-${{ matrix.name }}/report.json
      - uses: actions/upload-artifact@v6
        with:
          name: std-plugins-reference-${{ matrix.name }}-${{ github.run_id }}
          path: artifacts/performance/reference-${{ matrix.name }}/
          retention-days: 90
          if-no-files-found: error
